<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estudo Bíblico para Noisee 😁</title>

<style>
:root {
  --cor: #22c55e;
  --bg: #0f172a;
  --card: #1e293b;
  --text: white;
}

body {
  margin:0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

header {
  padding:15px;
  text-align:center;
  background: var(--card);
}

button {
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
  background: var(--cor);
  color:white;
}

.container { padding:15px; }

.hidden { display:none; }

.livros {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.verso {
  margin-bottom:10px;
  line-height:1.5;
}

</style>
</head>

<body>

<header>
📖 Estudo Bíblico para Noisee 😁
</header>

<div class="container">

<!-- HOME -->
<div id="home">
<h2>Para Vic e Yuki ❤️</h2>

<button onclick="abrir('biblia')">📖 Bíblia</button>
<button onclick="abrir('favoritosTela')">⭐ Favoritos</button>
<button onclick="abrir('recentesTela')">📌 Últimos</button>
<button onclick="abrir('temas')">🎨 Tema</button>
</div>

<!-- BÍBLIA -->
<div id="biblia" class="hidden">

<button onclick="abrir('home')">⬅ Voltar</button>

<input id="busca" placeholder="Ex: João 3:16">
<button onclick="buscar()">Buscar</button>

<h3>Livros</h3>
<div class="livros" id="livros"></div>

<div id="conteudo"></div>

</div>

<!-- FAVORITOS -->
<div id="favoritosTela" class="hidden">
<button onclick="abrir('home')">⬅ Voltar</button>
<h3>⭐ Favoritos</h3>
<div id="favoritos"></div>
</div>

<!-- RECENTES -->
<div id="recentesTela" class="hidden">
<button onclick="abrir('home')">⬅ Voltar</button>
<h3>📌 Últimos acessados</h3>
<div id="recentes"></div>
</div>

<!-- TEMAS -->
<div id="temas" class="hidden">
<button onclick="setCor('#22c55e')">Verde</button>
<button onclick="setCor('#3b82f6')">Azul</button>
<button onclick="setCor('#ec4899')">Rosa</button>
<button onclick="setCor('#ef4444')">Vermelho</button>
<button onclick="abrir('home')">⬅ Voltar</button>
</div>

</div>

<script>

function abrir(id){
  document.querySelectorAll('.container > div').forEach(e=>e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function setCor(c){
  document.documentElement.style.setProperty('--cor', c);
}

const livros = [
"Gênesis","Êxodo","Levítico","Números","Deuteronômio",
"Josué","Juízes","Rute","1 Samuel","2 Samuel","1 Reis","2 Reis",
"1 Crônicas","2 Crônicas","Esdras","Neemias","Ester","Jó","Salmos",
"Provérbios","Eclesiastes","Cantares","Isaías","Jeremias",
"Lamentações","Ezequiel","Daniel","Oséias","Joel","Amós",
"Obadias","Jonas","Miquéias","Naum","Habacuque","Sofonias",
"Ageu","Zacarias","Malaquias",
"Mateus","Marcos","Lucas","João","Atos","Romanos",
"1 Coríntios","2 Coríntios","Gálatas","Efésios","Filipenses",
"Colossenses","1 Tessalonicenses","2 Tessalonicenses",
"1 Timóteo","2 Timóteo","Tito","Filemom","Hebreus",
"Tiago","1 Pedro","2 Pedro","1 João","2 João","3 João","Judas","Apocalipse"
];

const livrosDiv = document.getElementById("livros");

livros.forEach(l=>{
  const b=document.createElement("button");
  b.innerText=l;
  b.onclick=()=>abrirLivro(l);
  livrosDiv.appendChild(b);
});

async function abrirLivro(l){
  salvarRecente(l);

  const res=await fetch(`https://bible-api.com/${l}+1?translation=almeida`);
  const data=await res.json();

  let html=`<h3>${data.reference}</h3>`;

  data.verses.forEach(v=>{
    html+=`
    <div class="verso"
    ontouchstart="startPress('${data.reference} ${v.verse}')"
    ontouchend="cancelPress()">
    <b>${v.verse}</b> ${v.text}
    </div>`;
  });

  document.getElementById("conteudo").innerHTML=html;
}

async function buscar(){
  const t=document.getElementById("busca").value;
  const res=await fetch(`https://bible-api.com/${t}?translation=almeida`);
  const data=await res.json();

  let html=`<h3>${data.reference}</h3>`;

  data.verses.forEach(v=>{
    html+=`<div class="verso"><b>${v.verse}</b> ${v.text}</div>`;
  });

  document.getElementById("conteudo").innerHTML=html;
}

// FAVORITAR COM SEGURAR

let tempo;

function startPress(v){
  tempo=setTimeout(()=>{
    favoritar(v);
    navigator.vibrate(200);
  },2000);
}

function cancelPress(){
  clearTimeout(tempo);
}

function favoritar(v){
  let f=JSON.parse(localStorage.getItem("fav")||"[]");

  if(!f.includes(v)){
    f.push(v);
    localStorage.setItem("fav",JSON.stringify(f));
    mostrarFav();
  }
}

function mostrarFav(){
  let f=JSON.parse(localStorage.getItem("fav")||"[]");
  document.getElementById("favoritos").innerHTML=f.map(x=>`<div>${x}</div>`).join("");
}

function salvarRecente(l){
  let r=JSON.parse(localStorage.getItem("rec")||"[]");
  r.unshift(l);

  r=[...new Set(r)];

  localStorage.setItem("rec",JSON.stringify(r.slice(0,5)));
  mostrarRec();
}

function mostrarRec(){
  let r=JSON.parse(localStorage.getItem("rec")||"[]");
  document.getElementById("recentes").innerHTML=r.map(x=>`<div>${x}</div>`).join("");
}

mostrarFav();
mostrarRec();

</script>

</body>
</html>
