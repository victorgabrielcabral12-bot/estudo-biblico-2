<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estudo Bíblico para Noisee 😁</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #ffffff;
}

.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #000000;
}

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: var(--text);
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  background: var(--card);
}

.menu {
  display: flex;
  justify-content: center;
  padding: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.container {
  padding: 15px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

.hidden {
  display: none;
}

.section-title {
  margin-top: 20px;
  font-size: 18px;
  text-align: center;
}

.livros {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.livros button {
  background: #334155;
  font-size: 12px;
}

#livroSelecionado {
  margin-top: 20px;
  text-align: center;
}
</style>
</head>

<body>

<header>📖 Estudo Bíblico para Noisee 😁</header>

<div class="menu">
<button onclick="mostrar('home')">🏠</button>
<button onclick="mostrar('biblia')">📖 Bíblia</button>
<button onclick="trocarTema()">🌙/☀️</button>
</div>

<h2>Bem-vindo</h2>
<p>Seu espaço de estudo bíblico.</p>

<button onclick="abrirLivro('Cantares')">Cantares</button>

<button onclick="abrirLivro('Lamentações')">Lamentações</button>
<button onclick="abrirLivro('Ezequiel')">Ezequiel</button>
<button onclick="abrirLivro('Daniel')">Daniel</button>

</div>

<script>

function mostrar(secao){
  document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
  document.getElementById(secao).classList.remove('hidden');
}

function trocarTema(){
  document.body.classList.toggle('light');
}

function abrirLivro(nome){
  document.getElementById("livroSelecionado").innerHTML =
    "<h3>"+nome+"</h3><p>Capítulos em breve...</p>";
}

</script>

</body>
</html>
