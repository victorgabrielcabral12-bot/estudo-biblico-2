<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estudo Bíblico para Noisee 😁</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --cor: #22c55e;
  --bg: #0f172a;
  --card: #1e293b;
  --text: white;
}

body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  padding:15px;
  text-align:center;
  background: var(--card);
  font-weight: bold;
}

button {
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
  background: var(--cor);
  color:white;
}

.container { padding:15px; }

.hidden { display:none; }

.livros, .caps {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.verso {
  margin-bottom:10px;
  line-height:1.6;
}

.deus {
  color:#1e3a8a;
  font-weight:bold;
}

.menu-popup {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<header>📖 Estudo Bíblico para Noisee 😁</header>

<div class="container">

<!-- HOME -->
<div id="home">
<h2>Para Vic e Yuki ❤️</h2>

<button onclick="abrir('biblia')">📖 Bíblia</button>
<button onclick="abrir('favoritosTela')">⭐ Favoritos</button>
</div>

<!-- BÍBLIA -->
<div id="biblia" class="hidden">
<button onclick="abrir('home')">⬅</button>
<h3>Livros</h3>
<div class="livros" id="livros"></div>
</div>

<!-- CAPÍTULOS -->
<div id="capitulos" class="hidden">
<button onclick="abrir('biblia')">⬅</button>
<h3 id="tituloLivro"></h3>
<div class="caps" id="caps"></div>
</div>

<!-- TEXTO -->
<div id="texto" class="hidden">
<button onclick="abrir('capitulos')">⬅</button>
<div id="conteudo"></div>
</div>

<!-- FAVORITOS -->
<div id="favoritosTela" class="hidden">
<button onclick="abrir('home')">⬅</button>
<h3>⭐ Favoritos</h3>
<div id="favoritos"></div>
</div>

</div>

<script>

function abrir(id){
  document.querySelectorAll('.container > div').forEach(e=>e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

const estrutura = {
"Gênesis":50,"Êxodo":40,"Levítico":27,"Números":36,"Deuteronômio":34,
"Josué":24,"Juízes":21,"Rute":4,"1 Samuel":31,"2 Samuel":24,"1 Reis":22,"2 Reis":25,
"1 Crônicas":29,"2 Crônicas":36,"Esdras":10,"Neemias":13,"Ester":10,"Jó":42,"Salmos":150,
"Provérbios":31,"Eclesiastes":12,"Cantares":8,"Isaías":66,"Jeremias":52,
"Lamentações":5,"Ezequiel":48,"Daniel":12,"Oséias":14,"Joel":3,"Amós":9,
"Obadias":1,"Jonas":4,"Miquéias":7,"Naum":3,"Habacuque":3,"Sofonias":3,
"Ageu":2,"Zacarias":14,"Malaquias":4,
"Mateus":28,"Marcos":16,"Lucas":24,"João":21,"Atos":28,"Romanos":16,
"1 Coríntios":16,"2 Coríntios":13,"Gálatas":6,"Efésios":6,"Filipenses":4,
"Colossenses":4,"1 Tessalonicenses":5,"2 Tessalonicenses":3,
"1 Timóteo":6,"2 Timóteo":4,"Tito":3,"Filemom":1,"Hebreus":13,
"Tiago":5,"1 Pedro":5,"2 Pedro":3,"1 João":5,"2 João":1,"3 João":1,"Judas":1,"Apocalipse":22
};

const livrosDiv=document.getElementById("livros");

Object.keys(estrutura).forEach(l=>{
  const b=document.createElement("button");
  b.innerText=l;
  b.onclick=()=>abrirCap(l);
  livrosDiv.appendChild(b);
});

function abrirCap(l){
  abrir("capitulos");
  document.getElementById("tituloLivro").innerText=l;

  const capsDiv=document.getElementById("caps");
  capsDiv.innerHTML="";

  for(let i=1;i<=estrutura[l];i++){
    const b=document.createElement("button");
    b.innerText=i;
    b.onclick=()=>abrirTexto(l,i);
    capsDiv.appendChild(b);
  }
}

async function abrirTexto(l,c){
  abrir("texto");

  const res=await fetch(`https://bible-api.com/${l}+${c}?translation=almeida`);
  const data=await res.json();

  let html=`<h3>${data.reference}</h3>`;

  data.verses.forEach(v=>{
    let texto=v.text;

    if(texto.includes("Senhor")){
      texto=`<span class="deus">${texto}</span>`;
    }

    html+=`<div class="verso"
    ontouchstart="segurar('${data.reference} ${v.verse}')"
    ontouchend="cancelar()">
    <b>${v.verse}</b> ${texto}
    </div>`;
  });

  document.getElementById("conteudo").innerHTML=html;
}

// MENU SEGURAR

let tempo,versoSel;

function segurar(v){
  versoSel=v;
  tempo=setTimeout(()=>{
    mostrarMenu();
  },1500);
}

function cancelar(){
  clearTimeout(tempo);
}

function mostrarMenu(){
  const menu=document.createElement("div");
  menu.className="menu-popup";
  menu.innerHTML=`
    <button onclick="fav()">⭐ Favoritar</button>
    <button onclick="fecharMenu()">Fechar</button>
  `;
  document.body.appendChild(menu);
}

function fecharMenu(){
  document.querySelector(".menu-popup")?.remove();
}

function fav(){
  let f=JSON.parse(localStorage.getItem("fav")||"[]");
  if(!f.includes(versoSel)){
    f.push(versoSel);
    localStorage.setItem("fav",JSON.stringify(f));
  }
  fecharMenu();
}

// FAVORITOS

function mostrarFav(){
  let f=JSON.parse(localStorage.getItem("fav")||"[]");

  if(f.length==0){
    document.getElementById("favoritos").innerHTML="nada favoritado 😝";
    return;
  }

  document.getElementById("favoritos").innerHTML=f.map(x=>`<div>${x}</div>`).join("");
}

mostrarFav();

</script>

</body>
</html>
