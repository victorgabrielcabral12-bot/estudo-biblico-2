<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estudo Bíblico para Noisee 😁</title>

<style>
:root {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #ffffff;
}

.light {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #000000;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  background: var(--card);
}

.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

.container {
  padding: 15px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

.hidden {
  display: none;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
  border: none;
}

.interlinear {
  text-align: center;
  margin-top: 20px;
}

.hebrew {
  font-size: 24px;
  direction: rtl;
}

.translation {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 5px;
  flex-wrap: wrap;
}
</style>
</head>

<body>

<header>📖 Estudo Bíblico para Noisee 😁</header>

<div class="menu">
<button onclick="mostrar('home')">🏠</button>
<button onclick="mostrar('leitura')">📖</button>
<button onclick="mostrar('anotacoes')">✍️</button>
<button onclick="mostrar('profundo')">🔍</button>
<button onclick="trocarTema()">🌙/☀️</button>
</div>

<div class="container">

<div id="home" class="card">
<h2>Bem-vindo</h2>
<p>Seu espaço de estudo bíblico.</p>
</div>

<div id="leitura" class="card hidden">
<h2>Gênesis 1:1</h2>

<select id="versao" onchange="trocarVersao()">
<option value="facil">Linguagem Fácil</option>
<option value="almeida">Almeida</option>
</select>

<p id="textoBiblia">
No princípio Deus criou os céus e a terra.
</p>
</div>

<div id="anotacoes" class="card hidden">
<h2>Suas Anotações</h2>
<textarea id="texto"></textarea>
</div>

<div id="profundo" class="card hidden">
<h2>Estudo Profundo</h2>

<div class="interlinear">

<div class="hebrew">
בְּרֵאשִׁית &nbsp; בָּרָא &nbsp; אֱלֹהִים
</div>

<div class="translation">
<span>No princípio</span>
<span>criou</span>
<span>Deus</span>
</div>

</div>

<p style="margin-top:15px;">
Tradução completa: No princípio Deus criou os céus e a terra.
</p>

</div>

</div>

<script>

function mostrar(secao){
  document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
  document.getElementById(secao).classList.remove('hidden');
}

function trocarTema(){
  document.body.classList.toggle('light');
}

function trocarVersao(){
  const versao = document.getElementById("versao").value;
  const texto = document.getElementById("textoBiblia");

  if(versao === "facil"){
    texto.innerText = "No princípio Deus criou os céus e a terra.";
  } else {
    texto.innerText = "No princípio criou Deus os céus e a terra.";
  }
}

const textarea = document.getElementById("texto");
textarea.value = localStorage.getItem("nota") || "";

textarea.addEventListener("input", () => {
  localStorage.setItem("nota", textarea.value);
});

</script>

</body>
</html>
