<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bíblia Noisee 😁</title>

<style>
:root {
  --cor:#22c55e;
  --bg:#0f172a;
  --card:#1e293b;
  --text:white;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:15px;
  text-align:center;
  background:var(--card);
}

button{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:var(--cor);
  color:white;
}

.hidden{display:none;}
.container{padding:15px;}

.verso{margin-bottom:10px;}

.interlinear{
  font-size:12px;
  opacity:0.8;
  margin-left:10px;
}

</style>
</head>

<body>

<header>📖 Bíblia Noisee 😁</header>

<div class="container">

<!-- HOME -->
<div id="home">
<h2>Para Vic e Yuki ❤️</h2>

<button onclick="abrir('biblia')">📖 Bíblia</button>
<button onclick="abrir('favoritosTela')">⭐ Favoritos</button>
<button onclick="abrir('recentesTela')">📌 Últimos</button>
<button onclick="toggleEstudo()">🧠 Estudo</button>
<button onclick="setEscuro()">🌙 Escuro</button>
</div>

<!-- BÍBLIA -->
<div id="biblia" class="hidden">
<button onclick="abrir('home')">⬅</button>

<button onclick="abrirTexto('genesis1')">Gênesis 1</button>
<button onclick="abrirTexto('joao1')">João 1</button>
<button onclick="abrirTexto('2joao1')">2 João</button>
</div>

<!-- TEXTO -->
<div id="texto" class="hidden">
<button onclick="abrir('biblia')">⬅</button>
<div id="conteudo"></div>
</div>

<!-- FAVORITOS -->
<div id="favoritosTela" class="hidden">
<button onclick="abrir('home')">⬅</button>
<div id="favoritos"></div>
</div>

<!-- RECENTES -->
<div id="recentesTela" class="hidden">
<button onclick="abrir('home')">⬅</button>
<div id="recentes"></div>
</div>

</div>

<script>

let estudo=false;

function toggleEstudo(){
  estudo=!estudo;
  alert(estudo?"Estudo ON":"Estudo OFF");
}

function abrir(id){
  document.querySelectorAll('.container > div').forEach(e=>e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if(id==="favoritosTela") mostrarFav();
  if(id==="recentesTela") mostrarRec();
}

function setEscuro(){
  document.documentElement.style.setProperty('--bg','#0f172a');
  document.documentElement.style.setProperty('--card','#1e293b');
  document.documentElement.style.setProperty('--text','#fff');
}

// DADOS (SEM ERRO)

const textos={
genesis1:[
["1","No princípio criou Deus os céus e a terra",
"בְּרֵאשִׁית (Bereshit) = princípio"],
["2","A terra era sem forma e vazia",
"תֹהוּ (Tohu) = vazio"]
],

joao1:[
["1","No princípio era o Verbo",
"Λόγος (Logos) = Palavra"],
["2","Ele estava com Deus",
"θεός (Theos) = Deus"]
],

"2joao1":[
["1","O presbítero à senhora eleita",
"πρεσβύτερος = ancião"],
["2","Por causa da verdade que permanece em nós",
"ἀλήθεια = verdade"],
["3","Graça, misericórdia e paz estarão conosco",
"χάρις = graça"]
]
};

let tempo,versoSel;

function abrirTexto(chave){
  abrir("texto");

  let html="";

  textos[chave].forEach(v=>{
    html+=`
    <div class="verso"
    ontouchstart="segurar('${v[1]}')"
    ontouchend="cancelar()">
    <b>${v[0]}</b> ${v[1]}
    ${estudo?`<div class="interlinear">${v[2]}</div>`:""}
    </div>`;
  });

  document.getElementById("conteudo").innerHTML=html;

  salvarRecente(chave);
}

// SEGURAR 2s

function segurar(v){
  versoSel=v;
  tempo=setTimeout(()=>{
    fav();
    navigator.vibrate(200);
  },2000);
}

function cancelar(){
  clearTimeout(tempo);
}

// FAVORITO (1 só)

function fav(){
  localStorage.setItem("fav",JSON.stringify([versoSel]));
}

// MOSTRAR FAVORITO

function mostrarFav(){
  let f=JSON.parse(localStorage.getItem("fav")||"[]");
  document.getElementById("favoritos").innerHTML=
  f.length?f[0]:"nada favoritado 😝";
}

// RECENTES

function salvarRecente(l){
  let r=JSON.parse(localStorage.getItem("rec")||"[]");
  r.unshift(l);
  r=[...new Set(r)];
  localStorage.setItem("rec",JSON.stringify(r.slice(0,5)));
}

function mostrarRec(){
  let r=JSON.parse(localStorage.getItem("rec")||"[]");
  document.getElementById("recentes").innerHTML=r.join("<br>");
}

</script>

</body>
</html>
