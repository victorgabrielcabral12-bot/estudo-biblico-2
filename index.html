<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estudo Bíblico para Noisee 😁</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  background: #1e1e1e;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.container {
  padding: 15px;
}

.hidden {
  display: none;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
}

.interlinear {
  text-align: center;
  margin-top: 20px;
}

.hebrew {
  font-size: 24px;
  direction: rtl;
}

.translation {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>📖 Estudo Bíblico para Noisee 😁</header>

<div class="container">

<button onclick="mostrar('home')">🏠 Início</button>
<button onclick="mostrar('leitura')">📖 Leitura</button>
<button onclick="mostrar('anotacoes')">✍️ Anotações</button>
<button onclick="mostrar('profundo')">🔍 Estudo Profundo</button>
<button onclick="trocarTema()">🌙/☀️ Tema</button>

<div id="home">
<h2>Bem-vindo!</h2>
<p>Seu espaço de estudo bíblico.</p>
</div>

<div id="leitura" class="hidden">
<h2>Gênesis 1:1</h2>
<p>No princípio Deus criou os céus e a terra.</p>
</div>

<div id="anotacoes" class="hidden">
<h2>Suas Anotações</h2>
<textarea id="texto"></textarea>
</div>

<div id="profundo" class="hidden">
<h2>Estudo Profundo</h2>

<div class="interlinear">
<div class="hebrew">
בְּרֵאשִׁית &nbsp;&nbsp; בָּרָא &nbsp;&nbsp; אֱלֹהִים
</div>

<div class="translation">
<span>No princípio</span>
<span>criou</span>
<span>Deus</span>
</div>
</div>

<p style="margin-top:15px;">
Tradução completa: No princípio Deus criou os céus e a terra.
</p>

</div>

</div>

<script>

function mostrar(secao){
  document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
  document.getElementById(secao).classList.remove('hidden');
}

function trocarTema(){
  if(document.body.style.background === 'white'){
    document.body.style.background = '#121212';
    document.body.style.color = 'white';
  } else {
    document.body.style.background = 'white';
    document.body.style.color = 'black';
  }
}

const texto = document.getElementById("texto");
texto.value = localStorage.getItem("nota") || "";

texto.addEventListener("input", () => {
  localStorage.setItem("nota", texto.value);
});

</script>

</body>
</html>
