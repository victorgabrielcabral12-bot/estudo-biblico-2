<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estudo Bíblico para Noisee 😁</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  text-align:center;
  padding:15px;
  background:#1e293b;
}

.frase {
  font-size:14px;
  opacity:0.7;
}

button {
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
}

.container { padding:15px; }

.hidden { display:none; }

.livros {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.verso {
  margin:5px 0;
  padding:8px;
  background:#1e293b;
  border-radius:8px;
}

input {
  width:90%;
  padding:8px;
  border-radius:8px;
  border:none;
}

</style>
</head>

<body>

<header>
📖 Estudo Bíblico para Noisee 😁
<div class="frase">Para Vic e Yuki</div>
</header>

<div class="container">

<input id="busca" placeholder="Ex: João 3:16">
<button onclick="buscar()">Buscar</button>

<div id="conteudo"></div>

<h3>📖 Livros</h3>
<div class="livros" id="livros"></div>

<h3>⭐ Favoritos</h3>
<div id="favoritos"></div>

<h3>📌 Últimos acessados</h3>
<div id="recentes"></div>

</div>

<script>

const livros = [
"Gênesis","Êxodo","Levítico","Números","Deuteronômio",
"Josué","Juízes","Rute","1 Samuel","2 Samuel","1 Reis","2 Reis",
"1 Crônicas","2 Crônicas","Esdras","Neemias","Ester","Jó","Salmos",
"Provérbios","Eclesiastes","Cantares","Isaías","Jeremias",
"Lamentações","Ezequiel","Daniel","Oséias","Joel","Amós",
"Obadias","Jonas","Miquéias","Naum","Habacuque","Sofonias",
"Ageu","Zacarias","Malaquias",
"Mateus","Marcos","Lucas","João","Atos","Romanos",
"1 Coríntios","2 Coríntios","Gálatas","Efésios","Filipenses",
"Colossenses","1 Tessalonicenses","2 Tessalonicenses",
"1 Timóteo","2 Timóteo","Tito","Filemom","Hebreus",
"Tiago","1 Pedro","2 Pedro","1 João","2 João","3 João","Judas","Apocalipse"
];

const livrosDiv = document.getElementById("livros");

livros.forEach(l=>{
  const btn=document.createElement("button");
  btn.innerText=l;
  btn.onclick=()=>abrirLivro(l);
  livrosDiv.appendChild(btn);
});

async function abrirLivro(livro){
  salvarRecente(livro);
  document.getElementById("conteudo").innerHTML="Carregando...";
  
  const res=await fetch(`https://bible-api.com/${livro}+1?translation=almeida`);
  const data=await res.json();

  mostrarVersos(data);
}

function mostrarVersos(data){
  let html=`<h3>${data.reference}</h3>`;
  data.verses.forEach(v=>{
    html+=`<div class="verso">
    <b>${v.verse}</b> ${v.text}
    <br><button onclick="favoritar('${data.reference} - ${v.verse}')">⭐</button>
    </div>`;
  });
  document.getElementById("conteudo").innerHTML=html;
}

async function buscar(){
  const texto=document.getElementById("busca").value;
  const res=await fetch(`https://bible-api.com/${texto}?translation=almeida`);
  const data=await res.json();
  mostrarVersos(data);
}

function favoritar(v){
  let fav=JSON.parse(localStorage.getItem("fav")||"[]");
  fav.push(v);
  localStorage.setItem("fav",JSON.stringify(fav));
  mostrarFav();
}

function mostrarFav(){
  let fav=JSON.parse(localStorage.getItem("fav")||"[]");
  document.getElementById("favoritos").innerHTML=fav.map(f=>`<div>${f}</div>`).join("");
}

function salvarRecente(l){
  let rec=JSON.parse(localStorage.getItem("rec")||"[]");
  rec.unshift(l);
  localStorage.setItem("rec",JSON.stringify(rec.slice(0,5)));
  mostrarRec();
}

function mostrarRec(){
  let rec=JSON.parse(localStorage.getItem("rec")||"[]");
  document.getElementById("recentes").innerHTML=rec.map(r=>`<div>${r}</div>`).join("");
}

mostrarFav();
mostrarRec();

</script>

</body>
</html>
